name: Export raw VOC Excel

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download original raw Excel
        run: |
          mkdir -p raw
          python - <<'PY'
          from pathlib import Path
          from urllib.request import urlopen
          url = 'https://raw.githubusercontent.com/liu2690/my-project/7f49bec2bc970a1e9012abbceb39e1b6e2965a9a/data/1%E3%80%812%E3%80%813.xlsx'
          target = Path('raw/1、2、3.xlsx')
          target.write_bytes(urlopen(url, timeout=120).read())
          print(target, target.stat().st_size)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: raw-voc-excel
          path: raw/1、2、3.xlsx
          retention-days: 1
