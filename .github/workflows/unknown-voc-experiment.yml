name: Unknown VOC autonomous experiment

on:
  push:
    branches: [main]
    paths:
      - experiments/unknown_features_experiment.py.gz.b64
      - .github/workflows/unknown-voc-experiment.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unknown-voc-autonomous-experiment
  cancel-in-progress: false

jobs:
  experiment:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Restore experiment script
        run: |
          base64 -d experiments/unknown_features_experiment.py.gz.b64 | gzip -d > experiments/unknown_features_experiment.py
          python -m py_compile experiments/unknown_features_experiment.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install openpyxl tabulate

      - name: Download original raw Excel
        run: |
          mkdir -p data/raw
          python - <<'PY'
          from pathlib import Path
          from urllib.request import urlopen
          url = 'https://raw.githubusercontent.com/liu2690/my-project/7f49bec2bc970a1e9012abbceb39e1b6e2965a9a/data/1%E3%80%812%E3%80%813.xlsx'
          target = Path('data/raw/1、2、3.xlsx')
          target.write_bytes(urlopen(url, timeout=120).read())
          print(target, target.stat().st_size)
          PY

      - name: Run autonomous experiment
        run: |
          python experiments/unknown_features_experiment.py \
            --raw-excel 'data/raw/1、2、3.xlsx' \
            --current-mat data/voc_dataset_1+2_vs_3.mat \
            --output results/unknown_voc \
            --n-jobs 2

      - name: Commit script and complete results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add experiments/unknown_features_experiment.py results/unknown_voc
          git rm experiments/unknown_features_experiment.py.gz.b64
          git commit -m 'experiment: confirm retained Unknown VOC features'
          git push

      - uses: actions/upload-artifact@v4
        with:
          name: unknown-voc-experiment
          path: results/unknown_voc

# Triggered after workflow installation so the push event is observed.
