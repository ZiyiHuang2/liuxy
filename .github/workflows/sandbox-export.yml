name: Sandbox repository export

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Package repository
        run: |
          zip -qr /tmp/liuxy-repository.zip . -x '.git/*'
      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-repository-export
          path: /tmp/liuxy-repository.zip
          retention-days: 1
