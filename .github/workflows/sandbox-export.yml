name: Apply sandbox Unknown VOC results

on:
  push:
    branches: [agent/unknown-voc-sandbox]
    paths:
      - .github/workflows/sandbox-export.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-sandbox-unknown-voc-results
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify and restore sandbox payload
        shell: bash
        run: |
          set -euo pipefail
          cat .sandbox/chunk-* > /tmp/liuxy-final-changes.tar.gz.b64
          base64 -d /tmp/liuxy-final-changes.tar.gz.b64 > /tmp/liuxy-final-changes.tar.gz
          echo '5f536053b71eb9372f12f48c183c3f39858f5c034af692026a6433c729848515  /tmp/liuxy-final-changes.tar.gz' | sha256sum -c -
          tar -xzf /tmp/liuxy-final-changes.tar.gz -C .
      - name: Remove obsolete and temporary files
        shell: bash
        run: |
          rm -f \
            .github/workflows/extract-unknown-data.yml \
            .github/workflows/import-dataset.yml \
            .github/workflows/unknown-voc-diagnose.yml \
            .github/workflows/unknown-voc-discovery.yml \
            .github/workflows/unknown-voc-experiment.yml \
            .github/workflows/unknown-voc-fast-experiment.yml \
            .github/workflows/unknown-voc-ping.yml \
            experiments/unknown_features_experiment.py.gz.b64 \
            results/unknown_voc_diagnostics/status.txt \
            results/unknown_voc_discovery/workflow_ping.txt
          rm -rf .sandbox
          rm -f .github/workflows/sandbox-export.yml
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Validate final repository
        shell: bash
        run: |
          python -m pip install -e '.[dev]'
          pytest -q
          python -m py_compile experiments/run_unknown_voc_comparison.py
          git diff --check
          test "$(find .github/workflows -maxdepth 1 -type f | wc -l)" -eq 1
          test ! -e .sandbox
      - name: Commit final result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'experiment: confirm retained Unknown VOC comparison'
          git push origin HEAD:agent/unknown-voc-sandbox
