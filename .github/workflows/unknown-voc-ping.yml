name: Unknown VOC workflow probe

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/unknown-voc-ping.yml

permissions:
  contents: write

jobs:
  ping:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          mkdir -p results/unknown_voc_discovery
          date -u +%FT%TZ > results/unknown_voc_discovery/workflow_ping.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add results/unknown_voc_discovery/workflow_ping.txt
          git commit -m 'ci: confirm Unknown VOC workflow execution'
          git pull --rebase origin main
          git push origin HEAD:main
