name: Replanned Unknown VOC experiment

on:
  pull_request:
    branches: [main]
    paths:
      - configs/unknown_voc_replanned.json
      - experiments/run_unknown_voc_replanned.py
      - tests/test_unknown_voc_replanned.py
      - .github/workflows/unknown-voc-comparison.yml
  workflow_dispatch:
    inputs:
      full:
        description: Run the full 12/16/32-seed protocol instead of the quick integrity run
        required: false
        default: false
        type: boolean
      n_jobs:
        description: Parallel seed workers
        required: false
        default: '2'
        type: choice
        options: ['1', '2', '4']

permissions:
  contents: read

concurrency:
  group: replanned-unknown-voc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest
      - name: Run replanned protocol
        shell: bash
        run: |
          args=(--n-jobs '${{ inputs.n_jobs || '2' }}' --output results/unknown_voc_replanned)
          if [[ '${{ github.event_name }}' == 'pull_request' || '${{ inputs.full }}' != 'true' ]]; then
            args+=(--quick)
          fi
          python experiments/run_unknown_voc_replanned.py "${args[@]}"
      - name: Upload experiment records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replanned-unknown-voc-${{ github.run_id }}
          path: results/unknown_voc_replanned
          if-no-files-found: error
          retention-days: 14
