name: Apply replanned Unknown VOC experiment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-replanned-unknown-voc
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/replan-unknown-voc
          fetch-depth: 0
      - name: Restore sandbox changes
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .sandbox/replan.tar.gz.b64 > /tmp/replan.tar.gz
          echo 'f984ae385d830f0c32c7ad59d38dcf76c86ac41591ca26e281f0e4b1389581af  /tmp/replan.tar.gz' | sha256sum -c -
          tar -xzf /tmp/replan.tar.gz -C .
          rm -rf .sandbox
          git restore --source=HEAD -- .github/workflows/unknown-voc-comparison.yml
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Validate replanned experiment
        shell: bash
        run: |
          python -m pip install -e '.[dev]'
          pytest -q
          python experiments/run_unknown_voc_replanned.py --quick --n-jobs 2 --output results/unknown_voc_replanned_quick --overwrite
          rm -rf results/unknown_voc_replanned_quick .work
          python -m py_compile experiments/run_unknown_voc_replanned.py
          git diff --check
      - name: Commit validated source changes
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md Makefile configs/unknown_voc_replanned.json experiments/run_unknown_voc_replanned.py docs/UNKNOWN_VOC_REPLAN.md tests/test_unknown_voc_replanned.py
          git commit -m 'experiment: replan retained Unknown VOC search'
          git push origin HEAD:agent/replan-unknown-voc
